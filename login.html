<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input id="name" placeholder="Enter name">
<button onclick="login()">Login</button>

<script>
function login(){
  let n = document.getElementById("name").value;
  if(!n) return;

  localStorage.setItem("username", n);
  window.location.href = "index.html";
}
</script>

</body>
</html>
